<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&display=swap" rel="stylesheet">

<body>
    <div class="container">
        <div class="container">
            <div class="section-one">
                <h1 class="section-one__name">J Rupika</h1>
                <p class="section-one__role">Web Developer</p>
                <a class="section-one__contact" href="index.html">Home</a>
            </div>
            <div class="contact-form">
                <form>
                    <table>
                        <tr>
                            <td>Name:</td>
                            <td><input type="text" placeholder="enter your name" class="contact-form__input"></td>
                        </tr>
                        <tr>
                            <td>Email:</td>
                            <td> <input type="Email" placeholder="enter your email"  class="contact-form__input"></td>
                        </tr>

                        <tr>
                            <td>Message:</td>
                            <td>
                                <input type="text" placeholder="Message"  class="contact-form__textarea">
                            </td>
                        </tr>
                        <tr>
                            <td></td>
                            <td><input type="submit"  class="contact-form__submit"></td>
                        </tr>
                    </table>
                </form>
            </div>

            <div class="section-five">
                <p class="section-five__title">
                    Social Media
                    <a href="#">LinkedIn</a>
                    <a href="#">Naukri</a>

                </p>
                <p class="section-five__desc">&copy;Rupika</p>
            </div>
        </div>
</body>

</html>
